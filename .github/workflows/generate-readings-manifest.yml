name: Build Site Pages

on:
  push:
    branches: [master]
    paths:
      - 'readings/**/*.md'
      - 'readings/**/_category.json'
      - 'blog/**/*.md'
      - 'scripts/build_readings.py'
      - 'scripts/build_blog.py'
      - 'assets/css/style.css'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdown

      - name: Build readings pages
        run: python scripts/build_readings.py

      - name: Build blog pages
        run: python scripts/build_blog.py

      - name: Commit generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add readings/ blog/
          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "chore: rebuild site pages [skip ci]"
            git push
          fi
